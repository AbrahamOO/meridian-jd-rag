# config/default.yaml  (zero-key, shippable)
# This is the committed default. It runs with NO API keys: local embeddings,
# local reranker, local (abstain-only or Ollama) generator. access.fail_closed
# is hardwired true; the loader rejects any attempt to set it false.
profile: default
providers:
  embedding:
    adapter: local
    model: bge-small-en-v1.5
    fallback: local
  generator:
    adapter: local
    model: local-instruct        # abstain-only stub if no local LLM present
  reranker:
    adapter: local
    model: bge-reranker-base
chunking:
  strategy: production           # production | naive
  child_target_tokens: 320
  child_overlap_pct: 0.12
  parent_max_tokens: 1200
retrieval:
  top_k_dense: 20
  top_k_sparse: 20
  rrf_k: 60
  rerank_top_n: 6
  context_token_budget: 3500
  superseded_penalty: 0.5        # multiplicative, see gap-register G-02
access:
  fail_closed: true              # never settable to false; loader rejects false
generation:
  temperature: 0.0
  max_tokens: 1024
